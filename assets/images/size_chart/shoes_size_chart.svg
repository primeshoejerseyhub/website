  <rect x="40" y="228" width="720" height="36" fill="#1e2535"/>
  <text x="80" y="251" font-family="Arial" font-size="13" fill="#e0eaf8">UK 9</text><text x="200" y="251" font-family="Arial" font-size="13" fill="#e0eaf8">EU 42</text><text x="320" y="251" font-family="Arial" font-size="13" fill="#e0eaf8">US 10</text><text x="440" y="251" font-family="Arial" font-size="13" fill="#e0eaf8">27 cm</text><text x="620" y="251" font-family="Arial" font-size="13" fill="#e0eaf8">Large</text>
  <rect x="40" y="264" width="720" height="36" fill="#161b27"/>
  <text x="80" y="287" font-family="Arial" font-size="13" fill="#e0eaf8">UK 10</text><text x="200" y="287" font-family="Arial" font-size="13" fill="#e0eaf8">EU 43</text><text x="320" y="287" font-family="Arial" font-size="13" fill="#e0eaf8">US 11</text><text x="440" y="287" font-family="Arial" font-size="13" fill="#e0eaf8">27.5 cm</text><text x="620" y="287" font-family="Arial" font-size="13" fill="#e0eaf8">Large</text>
  <rect x="40" y="300" width="720" height="36" fill="#1e2535"/>
