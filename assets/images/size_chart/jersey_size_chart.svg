<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440">
  <rect width="800" height="440" fill="#1a1f2e"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="22" fill="#4da6ff">JERSEY SIZE CHART</text>
  <text x="400" y="65" text-anchor="middle" font-family="Arial" font-size="12" fill="#8899aa">Measure your chest for best fit</text>
  <rect x="40" y="80" width="720" height="40" fill="#243044" rx="4"/>
  <text x="80" y="105" font-family="Arial" font-weight="bold" font-size="13" fill="#4da6ff">SIZE</text>
  <text x="200" y="105" font-family="Arial" font-weight="bold" font-size="13" fill="#4da6ff">CHEST (cm)</text>
  <text x="360" y="105" font-family="Arial" font-weight="bold" font-size="13" fill="#4da6ff">CHEST (inches)</text>
  <text x="540" y="105" font-family="Arial" font-weight="bold" font-size="13" fill="#4da6ff">HEIGHT</text>
  <rect x="40" y="120" width="720" height="36" fill="#161b27"/>
  <text x="80" y="143" font-family="Arial" font-size="13" fill="#e0eaf8">S</text><text x="200" y="143" font-family="Arial" font-size="13" fill="#e0eaf8">88–92 cm</text><text x="360" y="143" font-family="Arial" font-size="13" fill="#e0eaf8">34–36"</text><text x="540" y="143" font-family="Arial" font-size="13" fill="#e0eaf8">155–165 cm</text>
  <rect x="40" y="156" width="720" height="36" fill="#1e2535"/>
  <text x="80" y="179" font-family="Arial" font-size="13" fill="#e0eaf8">M</text><text x="200" y="179" font-family="Arial" font-size="13" fill="#e0eaf8">92–98 cm</text><text x="360" y="179" font-family="Arial" font-size="13" fill="#e0eaf8">36–38"</text><text x="540" y="179" font-family="Arial" font-size="13" fill="#e0eaf8">165–175 cm</text>
  <rect x="40" y="192" width="720" height="36" fill="#161b27"/>
  <text x="80" y="215" font-family="Arial" font-size="13" fill="#e0eaf8">L</text><text x="200" y="215" font-family="Arial" font-size="13" fill="#e0eaf8">98–104 cm</text><text x="360" y="215" font-family="Arial" font-size="13" fill="#e0eaf8">38–41"</text><text x="540" y="215" font-family="Arial" font-size="13" fill="#e0eaf8">175–183 cm</text>
  <rect x="40" y="228" width="720" height="36" fill="#1e2535"/>
  <text x="80" y="251" font-family="Arial" font-size="13" fill="#e0eaf8">XL</text><text x="200" y="251" font-family="Arial" font-size="13" fill="#e0eaf8">104–110 cm</text><text x="360" y="251" font-family="Arial" font-size="13" fill="#e0eaf8">41–43"</text><text x="540" y="251" font-family="Arial" font-size="13" fill="#e0eaf8">183–190 cm</text>
  <rect x="40" y="264" width="720" height="36" fill="#161b27"/>
  <text x="80" y="287" font-family="Arial" font-size="13" fill="#e0eaf8">XXL</text><text x="200" y="287" font-family="Arial" font-size="13" fill="#e0eaf8">110–116 cm</text><text x="360" y="287" font-family="Arial" font-size="13" fill="#e0eaf8">43–46"</text><text x="540" y="287" font-family="Arial" font-size="13" fill="#e0eaf8">190–198 cm</text>
  <text x="400" y="340" text-anchor="middle" font-family="Arial" font-size="12" fill="#4da6ff" font-weight="bold">HOW TO MEASURE</text>
  <text x="400" y="365" text-anchor="middle" font-family="Arial" font-size="11" fill="#8899aa">Chest: Measure around fullest part of chest, keeping tape parallel to floor</text>
  <text x="400" y="385" text-anchor="middle" font-family="Arial" font-size="11" fill="#8899aa">All jerseys are unisex with a relaxed fit</text>
  <text x="400" y="420" text-anchor="middle" font-family="Arial" font-size="11" fill="#556677">💡 Tip: For a slim/tight fit, go DOWN one size</text>
</svg>
